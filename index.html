<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Agro Forte: Corrida Sustentável | Trator e Animais no Campo</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a3b2a 0%, #1a5a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, sans-serif;
            padding: 20px;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #2d5a2a, #1a4018);
            border-radius: 48px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,200,0.3);
            border-bottom: 5px solid #f5c542;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            cursor: pointer;
            background: #6a9e5a;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            margin-bottom: 12px;
            gap: 15px;
            flex-wrap: wrap;
            background: #fef3d6;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: inset 0 1px 3px #0002, 0 6px 12px rgba(0,0,0,0.2);
        }

        .stat {
            background: linear-gradient(135deg, #2b5a25, #1e401a);
            padding: 6px 18px;
            border-radius: 36px;
            color: #fff0b5;
            font-weight: bold;
            display: flex;
            gap: 12px;
            font-size: 1rem;
            box-shadow: inset 0 -1px 0 #7aae5a, 0 4px 8px #0002;
        }

        .stat span:first-child {
            font-size: 0.85rem;
            background: #1f3a1a;
            padding: 3px 12px;
            border-radius: 30px;
        }

        .stat span:last-child {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: 800;
            min-width: 65px;
            text-align: center;
            color: #ffef9e;
        }

        .eco-badge {
            background: #2e7d32;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #fff0b0;
        }

        button {
            background: #f5b642;
            border: none;
            font-weight: bold;
            padding: 7px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1e3a1e;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 0 #9b4e15;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9b4e15;
        }

        .controls-tip {
            display: flex;
            gap: 14px;
            background: #1f2a14cc;
            padding: 5px 18px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff3c9;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .controls-tip span {
            background: #1f3a1b;
            color: #ffefb9;
            padding: 3px 10px;
            border-radius: 28px;
            font-family: monospace;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #eaf5cf;
            font-weight: bold;
            text-shadow: 1px 1px 0 #1a3a1a;
        }

        @media (max-width: 650px) {
            .game-wrapper { padding: 12px 15px 20px; }
            .stat span:last-child { font-size: 1.1rem; min-width: 50px; }
            button { padding: 5px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="850" height="580"></canvas>
        
        <div class="info-panel">
            <div class="stat">
                <span>🚜 ECO PONTOS</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="stat">
                <span>🌾 SUSTENTABILIDADE</span>
                <span id="sustainValue">100</span>
            </div>
            <div class="eco-badge">
                🐮 AGRO FORTE • RESPEITO AOS ANIMAIS 🌱
            </div>
            <button id="resetButton">🌍 NOVA PARTIDA</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;">
            <div class="controls-tip">
                🎮 <span>◀  ▶</span> SETAS ou <span>A / D</span>
            </div>
            <div class="controls-tip">
                🐄 Desvie dos Animais | 🌳 Colete Árvores | 💨 Evite Poluição
            </div>
        </div>
        <footer>
            🌻 “Agro forte, futuro sustentável: equilíbrio entre produção, meio ambiente e bem-estar animal” 🌻
        </footer>
    </div>
</div>

<script>
    (function() {
        // ----- CONFIGURAÇÕES DO JOGO -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dimensões
        const LANE_COUNT = 3;
        const LANE_WIDTH = canvas.width / LANE_COUNT;
        const TRACTOR_WIDTH = 64;
        const TRACTOR_HEIGHT = 54;
        
        // Posições centrais das faixas
        const laneCenters = [
            LANE_WIDTH / 2,
            LANE_WIDTH + LANE_WIDTH / 2,
            LANE_WIDTH * 2 + LANE_WIDTH / 2
        ];
        
        // Jogador
        let currentLane = 1;
        const tractorY = canvas.height - 90;
        
        // Arrays de elementos
        let obstacles = [];
        let frameCounter = 0;
        let gameActive = true;
        
        // Pontuação
        let ecoPoints = 0;
        let sustainability = 100;
        
        // Controle de spawn e velocidade
        let baseSpawnDelay = 48;
        let spawnCounter = 0;
        let currentSpeed = 4.5;
        
        let animationId = null;
        
        // ----- NOVOS TIPOS DE OBSTÁCULOS: ANIMAIS E ELEMENTOS DO CAMPO -----
        const ITEM_TYPES = {
            // ELEMENTOS POSITIVOS (AMBIENTAIS)
            TREE: { 
                name: 'Árvore', emoji: '🌳', color: '#4caf50', color2: '#3d8b40', 
                score: 18, sustain: 3, width: 42, height: 48, tipo: 'bom'
            },
            COMPOST: { 
                name: 'Compostagem', emoji: '🍂', color: '#cd8b3b', color2: '#b5722a', 
                score: 12, sustain: 2, width: 34, height: 34, tipo: 'bom'
            },
            AGRO_BIO: {
                name: 'Biofertilizante', emoji: '🌾', color: '#b5d96a', color2: '#8bb545', 
                score: 15, sustain: 2, width: 32, height: 32, tipo: 'bom'
            },
            FLOWER: {
                name: 'Flores Nativas', emoji: '🌸', color: '#e8a0c0', color2: '#d47090',
                score: 10, sustain: 1, width: 30, height: 30, tipo: 'bom'
            },
            
            // ANIMAIS (OBSTÁCULOS QUE REDUZEM SUSTENTABILIDADE - atropelar animais é ruim)
            COW: {
                name: 'Vaca', emoji: '🐮', color: '#d4a574', color2: '#b8875a',
                score: -20, sustain: -8, width: 48, height: 42, tipo: 'animal',
                mensagem: '🐄 Vaca no caminho! Respeite os animais!'
            },
            HORSE: {
                name: 'Cavalo', emoji: '🐴', color: '#c9a87b', color2: '#a8865e',
                score: -22, sustain: -9, width: 50, height: 44, tipo: 'animal',
                mensagem: '🐴 Cavalo atravessou! Preserve a fauna!'
            },
            CHICKEN: {
                name: 'Galinha', emoji: '🐔', color: '#e8c88a', color2: '#c9a86a',
                score: -12, sustain: -4, width: 30, height: 28, tipo: 'animal',
                mensagem: '🐔 Galinha escapou do galinheiro! Cuidado!'
            },
            PIG: {
                name: 'Porco', emoji: '🐷', color: '#e0b090', color2: '#c09070',
                score: -18, sustain: -6, width: 44, height: 38, tipo: 'animal',
                mensagem: '🐷 Porquinho na estrada! Desvie!'
            },
            SHEEP: {
                name: 'Ovelha', emoji: '🐑', color: '#e8e0c8', color2: '#c8c0a8',
                score: -15, sustain: -5, width: 42, height: 38, tipo: 'animal',
                mensagem: '🐑 Ovelha pastando na pista!'
            },
            
            // ELEMENTOS NEGATIVOS (POLUIÇÃO/EROSÃO)
            POLLUTION: { 
                name: 'Poluição', emoji: '💨', color: '#6b6b6b', color2: '#4a4a4a', 
                score: -30, sustain: -10, width: 38, height: 40, tipo: 'ruim'
            },
            ROCK: { 
                name: 'Erosão', emoji: '⛰️', color: '#8b7a6b', color2: '#6a5a4a', 
                score: -15, sustain: -5, width: 36, height: 32, tipo: 'ruim'
            },
            DEFOREST: {
                name: 'Desmatamento', emoji: '🪵', color: '#8b5a3a', color2: '#6a4a2a',
                score: -25, sustain: -8, width: 40, height: 35, tipo: 'ruim'
            }
        };
        
        // Lista de todos os tipos para spawn
        const allTypes = Object.keys(ITEM_TYPES);
        
        // Função que decide o tipo baseado na sustentabilidade (mais realista)
        function getItemType() {
            let r = Math.random() * 100;
            
            // Quanto maior a sustentabilidade, mais itens positivos e menos animais/ruins
            if (sustainability > 70) {
                if (r < 30) return 'TREE';
                if (r < 50) return 'COMPOST';
                if (r < 65) return 'AGRO_BIO';
                if (r < 75) return 'FLOWER';
                if (r < 82) return 'COW';
                if (r < 88) return 'SHEEP';
                if (r < 94) return 'CHICKEN';
                return 'POLLUTION';
            } 
            else if (sustainability > 45) {
                if (r < 22) return 'TREE';
                if (r < 40) return 'COMPOST';
                if (r < 52) return 'AGRO_BIO';
                if (r < 60) return 'FLOWER';
                if (r < 70) return 'COW';
                if (r < 78) return 'HORSE';
                if (r < 85) return 'SHEEP';
                if (r < 90) return 'PIG';
                if (r < 95) return 'CHICKEN';
                return 'POLLUTION';
            }
            else {
                // ambiente degradado: mais poluição, desmatamento e menos animais (eles fogem)
                if (r < 15) return 'TREE';
                if (r < 28) return 'COMPOST';
                if (r < 38) return 'AGRO_BIO';
                if (r < 45) return 'FLOWER';
                if (r < 55) return 'POLLUTION';
                if (r < 65) return 'ROCK';
                if (r < 75) return 'DEFOREST';
                if (r < 82) return 'COW';
                if (r < 88) return 'PIG';
                return 'CHICKEN';
            }
        }
        
        // Criar novo item na pista
        function spawnItem() {
            if (!gameActive) return;
            
            const typeKey = getItemType();
            const itemDef = ITEM_TYPES[typeKey];
            const lane = Math.floor(Math.random() * LANE_COUNT);
            
            const xPos = laneCenters[lane] - (itemDef.width / 2);
            
            obstacles.push({
                type: typeKey,
                lane: lane,
                x: xPos,
                y: -itemDef.height,
                width: itemDef.width,
                height: itemDef.height,
                scoreValue: itemDef.score,
                sustainDelta: itemDef.sustain,
                symbol: itemDef.emoji,
                color: itemDef.color,
                color2: itemDef.color2,
                name: itemDef.name,
                mensagem: itemDef.mensagem || null
            });
        }
        
        // Mostrar mensagem flutuante do animal/evento
        function showAnimalMessage(msg) {
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.position = 'fixed';
            div.style.left = '50%';
            div.style.top = '40%';
            div.style.transform = 'translate(-50%, -50%)';
            div.style.backgroundColor = 'rgba(0,0,0,0.8)';
            div.style.color = '#ffcc88';
            div.style.padding = '8px 20px';
            div.style.borderRadius = '40px';
            div.style.fontSize = '18px';
            div.style.fontWeight = 'bold';
            div.style.border = '2px solid #ffaa44';
            div.style.zIndex = '200';
            div.style.pointerEvents = 'none';
            div.style.whiteSpace = 'nowrap';
            div.style.fontFamily = 'monospace';
            document.body.appendChild(div);
            
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transition = 'opacity 0.5s';
                setTimeout(() => div.remove(), 500);
            }, 1200);
        }
        
        // Aplicar efeito da coleta
        function applyItemEffect(item) {
            if (!gameActive) return;
            
            ecoPoints += item.scoreValue;
            if (ecoPoints < 0) ecoPoints = 0;
            
            let newSustain = sustainability + item.sustainDelta;
            sustainability = Math.min(100, Math.max(0, newSustain));
            
            // Mostrar mensagem especial se for animal
            if (item.mensagem && item.scoreValue < 0) {
                showAnimalMessage(item.mensagem);
            }
            
            // Feedback visual flutuante
            showFloatingText(item.scoreValue, item.sustainDelta, item.symbol);
            
            if (sustainability <= 0) {
                gameActive = false;
            }
            
            updateUI();
            
            // Ajuste de velocidade dinâmica
            currentSpeed = 4.2 + Math.floor(ecoPoints / 160);
            if (currentSpeed > 8.5) currentSpeed = 8.5;
            if (currentSpeed < 3.8) currentSpeed = 3.8;
        }
        
        // Efeito visual de texto flutuante
        function showFloatingText(scoreDelta, sustainDelta, emoji) {
            const div = document.createElement('div');
            const sign = scoreDelta > 0 ? '+' : '';
            const color = scoreDelta > 0 ? '#b5ff8a' : '#ffaa88';
            const emojiText = emoji || (scoreDelta > 0 ? '🌿' : '💔');
            div.textContent = `${emojiText} ${sign}${scoreDelta} eco`;
            div.style.position = 'fixed';
            div.style.left = '50%';
            div.style.top = '45%';
            div.style.transform = 'translate(-50%, -50%)';
            div.style.color = color;
            div.style.fontSize = '26px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '2px 2px 0 #000';
            div.style.zIndex = '200';
            div.style.pointerEvents = 'none';
            div.style.fontFamily = 'monospace';
            div.style.whiteSpace = 'nowrap';
            document.body.appendChild(div);
            
            let opacity = 1;
            let posY = 45;
            const interval = setInterval(() => {
                opacity -= 0.05;
                posY -= 0.8;
                div.style.opacity = opacity;
                div.style.top = posY + '%';
                if (opacity <= 0) {
                    clearInterval(interval);
                    div.remove();
                }
            }, 30);
            setTimeout(() => { if(div.parentNode) div.remove(); }, 800);
        }
        
        // Atualizar interface
        function updateUI() {
            document.getElementById('scoreValue').innerText = Math.floor(ecoPoints);
            document.getElementById('sustainValue').innerText = Math.floor(sustainability);
        }
        
        // Atualizar lógica do jogo
        function updateGame() {
            if (!gameActive) return;
            
            // Mover itens para baixo
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].y += currentSpeed;
            }
            
            // Remover itens que saíram da tela
            obstacles = obstacles.filter(item => item.y < canvas.height + 100);
            
            // Verificar colisões com o trator
            const tractorLeft = laneCenters[currentLane] - TRACTOR_WIDTH/2;
            const tractorRight = laneCenters[currentLane] + TRACTOR_WIDTH/2;
            const tractorTop = tractorY;
            const tractorBottom = tractorY + TRACTOR_HEIGHT;
            
            for (let i = obstacles.length-1; i >= 0; i--) {
                const item = obstacles[i];
                const itemLeft = item.x;
                const itemRight = item.x + item.width;
                const itemTop = item.y;
                const itemBottom = item.y + item.height;
                
                const itemCenterX = item.x + item.width/2;
                const laneCenter = laneCenters[item.lane];
                const sameLane = Math.abs(itemCenterX - laneCenter) < LANE_WIDTH/2;
                
                if (sameLane && 
                    tractorLeft < itemRight && tractorRight > itemLeft &&
                    tractorTop < itemBottom && tractorBottom > itemTop) {
                    
                    applyItemEffect(item);
                    obstacles.splice(i,1);
                }
            }
            
            // Spawn automático
            let dynamicDelay = Math.max(30, 52 - Math.floor(ecoPoints / 150));
            if (dynamicDelay < 24) dynamicDelay = 24;
            baseSpawnDelay = dynamicDelay;
            
            spawnCounter++;
            if (spawnCounter >= baseSpawnDelay) {
                spawnCounter = 0;
                if (gameActive) spawnItem();
                // Ocasionalmente spawn duplo
                if (Math.random() < 0.2 && gameActive && ecoPoints > 80) {
                    spawnItem();
                }
            }
            
            if (sustainability <= 0) {
                gameActive = false;
            }
        }
        
        // ---------- DESENHO COMPLETO COM CENÁRIO ROLANTE ----------
        let bgOffset = 0;
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Fundo com gradiente de céu e solo
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height/2);
            skyGrad.addColorStop(0, '#c8eac0');
            skyGrad.addColorStop(1, '#9ad06a');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height/2);
            ctx.fillStyle = '#7aae5a';
            ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);
            
            // Nuvens no céu
            ctx.fillStyle = '#ffffffcc';
            for(let n=0; n<5; n++) {
                ctx.beginPath();
                ctx.ellipse(120 + n*180 + bgOffset*0.3, 45, 40, 25, 0, 0, Math.PI*2);
                ctx.fill();
            }
            
            // 2. Solo com textura
            bgOffset = (bgOffset + 2) % 50;
            ctx.fillStyle = '#b8874a';
            for (let i = 0; i < 25; i++) {
                ctx.fillRect((i * 35 + bgOffset) % canvas.width, canvas.height-28, 6, 6);
            }
            
            // 3. Faixas da pista
            for (let i = 0; i < LANE_COUNT; i++) {
                let xStart = i * LANE_WIDTH;
                ctx.beginPath();
                ctx.rect(xStart, 0, LANE_WIDTH-2, canvas.height);
                ctx.fillStyle = 'rgba(70, 50, 25, 0.2)';
                ctx.fill();
                ctx.strokeStyle = '#f5e6a0';
                ctx.lineWidth = 3;
                ctx.setLineDash([12, 25]);
                ctx.beginPath();
                ctx.moveTo(xStart + LANE_WIDTH, 0);
                ctx.lineTo(xStart + LANE_WIDTH, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Marcas de pista
                for(let s=20; s<canvas.height; s+=50){
                    ctx.fillStyle = '#d9b06a';
                    ctx.fillRect(xStart+15, s+ (bgOffset%35), 10, 4);
                    ctx.fillRect(xStart+LANE_WIDTH-30, s+ (bgOffset%25), 10, 4);
                }
            }
            
            // 4. Decorações laterais (cerca e plantas)
            ctx.font = '30px "Segoe UI Emoji"';
            for(let side=0; side<2; side++){
                let xOff = side===0 ? 8 : canvas.width-48;
                ctx.fillStyle = '#f3c26b';
                ctx.fillText('🌻', xOff, 70);
                ctx.fillText('🌾', xOff, 140);
                ctx.fillText('🐝', xOff, 210);
                ctx.fillText('🌿', xOff, 280);
                // Cerca
                ctx.fillStyle = '#9b7a4a';
                ctx.fillRect(xOff-5, 350, 8, 180);
                for(let c=0;c<4;c++) ctx.fillRect(xOff-15, 360+c*50, 28, 5);
            }
            
            // 5. Desenhar todos os itens com animação de pulo para animais
            for (let item of obstacles) {
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 5;
                
                // Efeito de pulo para animais
                let yOffset = 0;
                if (item.tipo === 'animal') {
                    yOffset = Math.sin(Date.now() * 0.008 + item.x) * 4;
                }
                
                const grad = ctx.createLinearGradient(item.x, item.y, item.x+item.width, item.y+item.height);
                grad.addColorStop(0, item.color);
                grad.addColorStop(1, item.color2);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(item.x, item.y + yOffset, item.width, item.height, 12);
                ctx.fill();
                
                ctx.fillStyle = '#ffffdd';
                ctx.font = `${Math.floor(item.height * 0.6)}px "Segoe UI Emoji"`;
                ctx.fillText(item.symbol, item.x + item.width*0.22, item.y + item.height*0.7 + yOffset);
                
                // Destaque para animais
                if(item.tipo === 'animal'){
                    ctx.strokeStyle = '#ffaa66';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(item.x, item.y + yOffset, item.width, item.height, 12);
                    ctx.stroke();
                }
                
                ctx.font = 'bold 11px monospace';
                ctx.fillStyle = item.scoreValue > 0 ? '#aaffaa' : '#ffccaa';
                const valText = item.scoreValue > 0 ? `+${item.scoreValue}` : `${item.scoreValue}`;
                ctx.fillText(valText, item.x+4, item.y-5 + yOffset);
            }
            
            // 6. Desenhar TRATOR ESTILIZADO
            ctx.shadowBlur = 8;
            const tractorX = laneCenters[currentLane] - TRACTOR_WIDTH/2;
            
            // Corpo
            ctx.fillStyle = '#e08e3a';
            ctx.beginPath();
            ctx.roundRect(tractorX, tractorY, TRACTOR_WIDTH, TRACTOR_HEIGHT, 12);
            ctx.fill();
            // Cabine
            ctx.fillStyle = '#6d9bc3';
            ctx.beginPath();
            ctx.roundRect(tractorX+8, tractorY-20, 48, 24, 8);
            ctx.fill();
            // Janelas
            ctx.fillStyle = '#bdeeff';
            ctx.fillRect(tractorX+14, tractorY-15, 14, 13);
            ctx.fillRect(tractorX+36, tractorY-15, 14, 13);
            // Teto
            ctx.fillStyle = '#b57a3a';
            ctx.fillRect(tractorX+5, tractorY-24, 54, 8);
            // Rodas
            ctx.fillStyle = '#2c2c2c';
            ctx.beginPath();
            ctx.ellipse(tractorX+14, tractorY+TRACTOR_HEIGHT-10, 16, 13, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(tractorX+TRACTOR_WIDTH-14, tractorY+TRACTOR_HEIGHT-10, 16, 13, 0, 0, Math.PI*2);
            ctx.fill();
            // Detalhes das rodas
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.arc(tractorX+14, tractorY+TRACTOR_HEIGHT-10, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(tractorX+TRACTOR_WIDTH-14, tractorY+TRACTOR_HEIGHT-10, 6, 0, Math.PI*2);
            ctx.fill();
            // Chaminé
            ctx.fillStyle = '#8b6b42';
            ctx.fillRect(tractorX+50, tractorY-14, 8, 22);
            // Farol
            ctx.fillStyle = '#ffcc66';
            ctx.beginPath();
            ctx.arc(tractorX+TRACTOR_WIDTH-12, tractorY+16, 7, 0, Math.PI*2);
            ctx.fill();
            
            // Dica ecológica flutuante
            if (gameActive && frameCounter % 140 < 70) {
                ctx.font = 'italic 11px "Segoe UI"';
                ctx.fillStyle = '#fff9cf';
                ctx.shadowBlur = 3;
                ctx.fillText('🐮 Respeite os animais do campo!', tractorX-20, tractorY-32);
            }
            
            // Barra de sustentabilidade
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#332c1a';
            ctx.fillRect(canvas.width-140, 15, 120, 20);
            let sustainPercent = sustainability/100;
            let barColor = sustainPercent > 0.6 ? '#6fbf4c' : (sustainPercent > 0.3 ? '#e0a82b' : '#d94f30');
            ctx.fillStyle = barColor;
            ctx.fillRect(canvas.width-138, 17, 116 * sustainPercent, 16);
            ctx.fillStyle = '#ffffcc';
            ctx.font = 'bold 10px monospace';
            ctx.fillText(`Sustentabilidade ${Math.floor(sustainability)}%`, canvas.width-135, 31);
            
            // Mensagem de game over
            if (!gameActive) {
                ctx.globalAlpha = 0.94;
                ctx.fillStyle = '#0a2610';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = 'bold 34px "Poppins"';
                ctx.fillStyle = '#fae672';
                ctx.fillText('🌿 GAME OVER 🌿', canvas.width/2-160, canvas.height/2-50);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#d4f0b2';
                ctx.fillText('A sustentabilidade foi comprometida...', canvas.width/2-180, canvas.height/2+10);
                ctx.font = '16px "Segoe UI"';
                ctx.fillStyle = '#ffcf9a';
                ctx.fillText('Proteja a natureza e os animais!', canvas.width/2-150, canvas.height/2+70);
                ctx.font = 'bold 22px monospace';
                ctx.fillStyle = '#ffea9e';
                ctx.fillText(`🌾 Eco Pontos: ${Math.floor(ecoPoints)}`, canvas.width/2-110, canvas.height/2+140);
            }
            
            ctx.shadowBlur = 0;
            ctx.setLineDash([]);
        }
        
        // Helper roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ----- CONTROLES -----
        function changeLane(delta) {
            if (!gameActive) return;
            let newLane = currentLane + delta;
            if (newLane >= 0 && newLane < LANE_COUNT) {
                currentLane = newLane;
            }
        }
        
        function handleKey(e) {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                changeLane(-1);
                e.preventDefault();
            } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                changeLane(1);
                e.preventDefault();
            }
        }
        
        // Reset completo
        function resetGame() {
            gameActive = true;
            ecoPoints = 0;
            sustainability = 100;
            currentLane = 1;
            obstacles = [];
            frameCounter = 0;
            spawnCounter = 0;
            currentSpeed = 4.5;
            updateUI();
            for(let i=0; i<5; i++) {
                setTimeout(() => { if(gameActive) spawnItem(); }, i * 150);
            }
        }
        
        // Loop principal
        function gameLoop() {
            if (gameActive) {
                updateGame();
                frameCounter++;
            }
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Eventos
        window.addEventListener('keydown', handleKey);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
            if (touchX < canvas.width / 2) changeLane(-1);
            else changeLane(1);
        });
        
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            if (mouseX < canvas.width / 2) changeLane(-1);
            else changeLane(1);
        });
        
        const resetBtn = document.getElementById('resetButton');
        resetBtn.addEventListener('click', () => resetGame());
        
        // Iniciar
        resetGame();
        updateUI();
        for(let i=0; i<4; i++) spawnItem();
        animationId = requestAnimationFrame(gameLoop);
    })();
</script>
</body>
</html>
